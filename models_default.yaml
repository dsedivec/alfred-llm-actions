# Default model list — ships with the workflow.
# User overrides go in models.yaml (see README.md).

models:
  # OpenAI
  - label: GPT-4o
    provider: openai
    model: gpt-4o

  - label: GPT-4o Mini
    provider: openai
    model: gpt-4o-mini

  - label: GPT-4.1
    provider: openai
    model: gpt-4.1

  - label: GPT-4.1 Mini
    provider: openai
    model: gpt-4.1-mini

  - label: GPT-4.1 Nano
    provider: openai
    model: gpt-4.1-nano

  - label: o3-mini
    provider: openai
    model: o3-mini

  # Anthropic
  - label: Claude Sonnet
    provider: anthropic
    model: claude-sonnet-4-6

  - label: Claude Haiku
    provider: anthropic
    model: claude-haiku-4-5-20251001

  - label: Claude Opus
    provider: anthropic
    model: claude-opus-4-6

  - label: Claude Opus (reasoning)
    provider: anthropic
    model: claude-opus-4-6
    params:
      reasoning: auto

  # Google Gemini
  - label: Gemini 2.0 Flash
    provider: gemini
    model: gemini-2.0-flash

  - label: Gemini 2.5 Pro
    provider: gemini
    model: gemini-2.5-pro-preview-05-06

  # OpenRouter
  - label: OpenRouter Auto
    provider: openrouter
    model: openrouter/auto

  - label: Sonnet via OpenRouter
    provider: openrouter
    model: anthropic/claude-sonnet-4-6

  - label: Gemini Flash via OpenRouter
    provider: openrouter
    model: google/gemini-2.0-flash-001

  - label: Opus via OpenRouter (web search)
    provider: openrouter
    model: anthropic/claude-opus-4-6
    params:
      web_search: true
      plugins:
        - web
      provider:
        quantizations:
          - bf16
          - fp16
